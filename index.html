<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>2.5D Forest Engine</title>
  </head>
  <body>
    <div id="app">
      <canvas id="gameCanvas"></canvas>
      <div id="ui">
        <h2>2.5D Rendering Engine</h2>
        <p>Swipe, drag, or scroll horizontally to move</p>
        <div class="control">
          <label for="aperture">Aperture (f-stop):</label>
          <input type="range" id="aperture" min="0.5" max="16" step="0.1" value="2.8" />
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
