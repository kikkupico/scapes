<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scapes – 2.5D Engine</title>
  <link rel="stylesheet" href="Scape.css" />
</head>
<body>
<div id="app">
  <h1>Scapes Engine</h1>

  <div id="canvas-wrap">
    <canvas id="scape"></canvas>
  </div>

  <div id="controls">

    <!-- Playback -->
    <div class="panel">
      <h3>Playback</h3>
      <div class="btn-row">
        <button id="btn-play" class="active">Pause</button>
      </div>
      <div class="row">
        <label>Camera speed</label>
        <input type="range" id="sl-speed" min="0" max="300" step="5" value="80" />
        <span class="val" id="vl-speed">80</span>
      </div>
      <div class="row">
        <label>View angle</label>
        <input type="range" id="sl-angle" min="-30" max="60" step="1" value="20" />
        <span class="val" id="vl-angle">20°</span>
      </div>
      <div class="btn-row">
        <button data-angle="-15" title="Gaoyuan — look up at peaks">高遠</button>
        <button data-angle="0"   title="Shenyuan — look into recession">深遠</button>
        <button data-angle="25"  title="Pingyuan — panoramic level view" class="active">平遠</button>
      </div>
    </div>

    <!-- Depth of Field -->
    <div class="panel">
      <h3>Depth of Field</h3>
      <label class="toggle">
        <input type="checkbox" id="cb-dof" />
        <span class="knob"></span>
        <span>Enabled</span>
      </label>
      <div class="row">
        <label>Focus depth</label>
        <input type="range" id="sl-dof-z" min="30" max="1500" step="10" value="300" />
        <span class="val" id="vl-dof-z">300</span>
      </div>
      <div class="row">
        <label>Strength</label>
        <input type="range" id="sl-dof-str" min="0" max="0.05" step="0.001" value="0.015" />
        <span class="val" id="vl-dof-str">0.015</span>
      </div>
    </div>

    <!-- Fog -->
    <div class="panel">
      <h3>Atmospheric Fog</h3>
      <label class="toggle">
        <input type="checkbox" id="cb-fog" />
        <span class="knob"></span>
        <span>Enabled</span>
      </label>
      <div class="row">
        <label>Density</label>
        <input type="range" id="sl-fog-den" min="0" max="1" step="0.01" value="0.88" />
        <span class="val" id="vl-fog-den">0.88</span>
      </div>
    </div>

    <!-- Presets -->
    <div class="panel">
      <h3>Scene Presets</h3>
      <div class="btn-row">
        <button data-preset="noon"    class="active">Noon</button>
        <button data-preset="lantern"            >Lantern Lake</button>
        <button data-preset="city"               >City</button>
      </div>
    </div>

  </div>
</div>

<script type="module">
import { ScapeEngine } from './ScapeEngine.js';
import { Sky, Backdrop, Stage, whenSpritesLoaded } from './ScapeLayers.js';

// ── Presets ───────────────────────────────────────────────────

const PRESETS = {

  noon: {
    sky: ['#1a70c0', '#2a90e0', '#55b0f0', '#88ccf8', '#c0e8ff'],
    fog: { color: [210, 230, 255] },
    ridges: [
      { baseY: 0.87, amplitude: 0.24, color: '#7090b0',
        snowColor: 'rgba(255,255,255,0.85)', snowLine: 0.38,
        parallaxFactor: 0.05, seed: 11 },
      { baseY: 0.945, amplitude: 0.18, color: '#507060',
        parallaxFactor: 0.10, seed: 77 },
      { baseY: 1.005, amplitude: 0.10, color: '#3a5848',
        parallaxFactor: 0.16, seed: 88 },
    ],
    ground: {
      nearColor: '#1e3820',
      farColor:  '#1a3030',
      gridColor: 'rgba(80,160,80,0.45)',
    },
    procedural: {
      tall: [
        // Distant ridgeline — sparse pines at horizon
        { sprites: ['pine1', 'pine2', 'oak1'],  z: 1100, width: 60, height: 280, density: 0.10, color: '#2a5030', trunkColor: '#1a2010' },
        // Mid-ground mixed forest — oaks and birch
        { sprites: ['oak1', 'oak2', 'birch1'],  z: 700,  width: 60, height: 280, density: 0.13, color: '#2a5030', trunkColor: '#1a2010' },
        // Foreground stand — denser pines
        { sprites: ['pine1', 'pine2'],           z: 420,  width: 60, height: 280, density: 0.16, color: '#2a5030', trunkColor: '#1a2010' },
      ],
      short: [
        { kind: 'bush',  sprites: ['bush1', 'bush2', 'shrub1', 'shrub2'], z: 330, width: 55, height: 38, density: 0.22, color: '#224828' },
        { kind: 'grass', z: 310, width: 26, height: 26, density: 0.38, color: '#4a8050' },
        { kind: 'rock',  z: 360, width: 38, height: 20, density: 0.12, color: '#808878' },
      ],
    },
  },

  lantern: {
    sky: ['#0a0520', '#180838', '#3d1250', '#7a2060', '#c44860', '#e87840', '#f4c060'],
    fog: { color: [220, 130, 70] },
    ridges: [
      { baseY: 0.82, amplitude: 0.18, color: '#1a0d2e', parallaxFactor: 0.04, seed: 31 },
      { baseY: 0.91, amplitude: 0.11, color: '#12081e', parallaxFactor: 0.09, seed: 42 },
      { baseY: 1.00, amplitude: 0.05, color: '#0c0514', parallaxFactor: 0.15, seed: 53 },
    ],
    ground: {
      nearColor: '#080c14',
      farColor:  '#090e1a',
      gridColor: 'rgba(80,100,160,0.35)',
    },
    procedural: {
      tall: [
        // Far shore — silhouette pagodas on the horizon
        { sprites: ['pagoda'],  z: 920, width: 70, height: 280, density: 0.03, color: '#18080e', trunkColor: '#100608' },
        // Mid lake bank — bamboo groves
        { sprites: ['bamboo'],  z: 580, width: 50, height: 280, density: 0.14, color: '#0a1808', trunkColor: '#060c04' },
        // Near bank — weeping willows over the water
        { sprites: ['willow'],  z: 360, width: 80, height: 300, density: 0.12, color: '#0a1a08', trunkColor: '#060c04' },
      ],
      short: [
        { sprites: ['lantern'],  z: 300, width: 28, height: 52, density: 0.18, color: '#c83818', floatY: [30, 200], floatZ: [200, 900] },
        { sprites: ['lotus'],    z: 320, width: 55, height: 35, density: 0.22, color: '#d07888' },
        { kind: 'grass',         z: 290, width: 20, height: 22, density: 0.35, color: '#1a3020' },
      ],
    },
  },

  city: {
    sky: ['#000004', '#020410', '#06081c', '#0c0c26', '#180c20', '#240c12', '#180808'],
    fog: { color: [180, 100, 50] },
    ridges: [
      { baseY: 0.88, amplitude: 0.07, color: '#0c0e1a', parallaxFactor: 0.02, seed: 91 },
      { baseY: 0.94, amplitude: 0.04, color: '#090c16', parallaxFactor: 0.06, seed: 82 },
      { baseY: 1.00, amplitude: 0.02, color: '#070910', parallaxFactor: 0.12, seed: 73 },
    ],
    ground: {
      nearColor: '#09090c',
      farColor:  '#07070e',
      gridColor: 'rgba(100,90,80,0.5)',
    },
    procedural: {
      tall: [
        // Distant skyline — dense tower cluster far back
        { sprites: ['building1', 'building2', 'building3'], z: 1100, width: 90, height: 380, density: 0.38, color: '#0a0c18', trunkColor: '#060810' },
        // Mid-ground office blocks
        { sprites: ['building2', 'building3'],              z: 600,  width: 80, height: 340, density: 0.28, color: '#0a0c18', trunkColor: '#060810' },
        // Near foreground buildings — wide and close
        { sprites: ['building1', 'building3'],              z: 330,  width: 70, height: 300, density: 0.20, color: '#0a0c18', trunkColor: '#060810' },
      ],
      short: [
        { sprites: ['streetlight'],  z: 280, width: 16, height: 110, density: 0.22, color: '#1a1a24' },
        { kind: 'rock',              z: 270, width: 40, height: 18,  density: 0.08, color: '#1a1a1e' },
      ],
    },
  },

};

// ── Engine setup ──────────────────────────────────────────────

const canvas = document.getElementById('scape');
const engine = new ScapeEngine(canvas, 960, 540);
let currentPreset = 'noon';

function applyPreset(name) {
  currentPreset = name;
  const p = PRESETS[name];

  engine.sky      = new Sky(p.sky);
  engine.backdrop = new Backdrop(p.ridges);
  engine.stage    = new Stage({
    ground:     p.ground,
    procedural: p.procedural,
    seed:       name.length * 17 + 3,
  });

  engine.fog.color = p.fog.color;

  // Precompute lit+sized sprite canvases for this preset.
  // Run immediately (hits any already-cached images) then again
  // once all sprites have fully loaded.
  engine.stage.precompute(engine);
  whenSpritesLoaded().then(() => engine.stage?.precompute(engine));

  document.querySelectorAll('[data-preset]').forEach(b =>
    b.classList.toggle('active', b.dataset.preset === name)
  );
}

applyPreset('noon');
engine.start();

// ── UI wiring ─────────────────────────────────────────────────

// Play / Pause
let playing = true;
document.getElementById('btn-play').addEventListener('click', e => {
  playing = !playing;
  if (playing) { engine.start(); e.target.textContent = 'Pause'; e.target.classList.add('active'); }
  else         { engine.stop();  e.target.textContent = 'Play';  e.target.classList.remove('active'); }
});

// Speed
bind('sl-speed', 'vl-speed', v => engine.cameraSpeed = +v);

// View angle (camera pitch)
bind('sl-angle', 'vl-angle', v => {
  engine.setViewAngle(+v);
  document.querySelectorAll('[data-angle]').forEach(b =>
    b.classList.toggle('active', +b.dataset.angle === +v)
  );
}, v => `${v}°`);

// Guo Xi Three Distances — snap the view-angle slider to a preset pitch
document.querySelectorAll('[data-angle]').forEach(btn => {
  btn.addEventListener('click', () => {
    const deg = +btn.dataset.angle;
    const sl  = document.getElementById('sl-angle');
    const vl  = document.getElementById('vl-angle');
    sl.value       = deg;
    vl.textContent = `${deg}°`;
    engine.setViewAngle(deg);
    document.querySelectorAll('[data-angle]').forEach(b =>
      b.classList.toggle('active', b === btn)
    );
  });
});

// DoF
document.getElementById('cb-dof').addEventListener('change', e =>
  engine.dof.enabled = e.target.checked
);
bind('sl-dof-z',   'vl-dof-z',   v => engine.dof.focusZ    = +v);
bind('sl-dof-str', 'vl-dof-str', v => engine.dof.strength  = +v);

// Fog
document.getElementById('cb-fog').addEventListener('change', e =>
  engine.fog.enabled = e.target.checked
);
bind('sl-fog-den', 'vl-fog-den', v => engine.fog.maxAlpha = +v);

// Presets
document.querySelectorAll('[data-preset]').forEach(btn =>
  btn.addEventListener('click', () => applyPreset(btn.dataset.preset))
);

// Helper – optional `fmt` formats the displayed label
function bind(sliderId, valId, fn, fmt = v => v) {
  const sl = document.getElementById(sliderId);
  const vl = document.getElementById(valId);
  sl.addEventListener('input', () => { fn(sl.value); vl.textContent = fmt(sl.value); });
}
</script>
</body>
</html>
